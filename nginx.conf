# nginx.conf — 1folder self-hosting configuration
# Drop this into /etc/nginx/sites-available/1folder
# then: sudo ln -s /etc/nginx/sites-available/1folder /etc/nginx/sites-enabled/
# and:  sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/1folder/public;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;
    add_header X-XSS-Protection        "1; mode=block";

    # Service worker — never cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Web manifest
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=3600";
    }

    # Digital Asset Links (required for TWA)
    location = /.well-known/assetlinks.json {
        alias /var/www/1folder/android-twa/.well-known/assetlinks.json;
        add_header Content-Type "application/json";
        add_header Cache-Control "public, max-age=3600";
    }

    # Share handler — rewrite to index.html (SW handles the POST)
    location = /share-handler {
        try_files $uri /index.html;
    }

    # Static assets — long cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
